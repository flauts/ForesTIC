services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      FORESTIC_QR_SECRET: "demo-secret-change-me"
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
